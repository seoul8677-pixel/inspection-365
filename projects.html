  <!-- 카테고리 필터 JavaScript (YUUA 원본 그대로) -->
  <script>
  $('#item ul li span').on('click', function() {
      $('#item ul li span').removeClass('current');
      $(this).addClass('current');
  });

  $(function() {
      $('#item ul li').each(function() {
          $(this).click(function() {
              var idname = $(this).attr("id");
              var classname = '.' + idname;
              $('#case figure').css('display', 'none');
              $(classname).fadeIn(500);
          });
      });
  });

  // 모바일 카테고리 토글
  $(function() {
      $('#item div').on('click', function() {
          $(this).next().slideToggle(200);
          $('#item div span').toggleClass('open', 200);
      });
  });
  </script>
